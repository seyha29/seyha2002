openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tokens
    description: Push notification token operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /tokens:
    post:
      operationId: registerToken
      tags: [tokens]
      summary: Register push token
      description: Registers an Expo push notification token for a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRegistrationRequest"
      responses:
        "201":
          description: Token registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRegistrationResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TokenRegistrationRequest:
      type: object
      properties:
        token:
          type: string
          description: Expo push notification token
        platform:
          type: string
          enum: [ios, android]
          description: Device platform
      required:
        - token
    TokenRegistrationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
